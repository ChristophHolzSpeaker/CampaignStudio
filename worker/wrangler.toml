name = "campaignstudio-attribution-worker"
main = "src/index.ts"
compatibility_date = "2026-04-14"

# Local defaults for `wrangler dev`.
# Sensitive values come from `worker/.dev.vars`.
[vars]
BOOKING_BASE_URL = "https://campaignstudio-attribution-worker-staging.speaker.workers.dev"
BOOKING_CALENDAR_ID = "podcast@christophholz.com"
BOOKING_LINK_TTL_SECONDS = "2592000"

[triggers]
crons = ["*/15 * * * *"]

[env.staging]
name = "campaignstudio-attribution-worker-staging"

[env.staging.vars]
BOOKING_BASE_URL = "https://campaignstudio-attribution-worker-staging.speaker.workers.dev"
BOOKING_CALENDAR_ID = "podcast@christophholz.com"
BOOKING_LINK_TTL_SECONDS = "2592000"

[env.staging.triggers]
crons = ["*/15 * * * *"]

[env.production]
name = "campaignstudio-attribution-worker-production"

[env.production.vars]
BOOKING_BASE_URL = "https://campaignstudio-attribution-worker-production.speaker.workers.dev"
BOOKING_CALENDAR_ID = "podcast@christophholz.com"
BOOKING_LINK_TTL_SECONDS = "2592000"

[env.production.triggers]
crons = ["*/15 * * * *"]
